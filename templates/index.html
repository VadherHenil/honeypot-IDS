<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }

        a {
            color: #38bdf8;
        }
    </style>
</head>
<body>

<h2>Secure Login</h2>

<form method="POST">
    <input name="username" placeholder="Username"><br>
    <input name="password" type="password" placeholder="Password"><br>
    <button type="submit">Login</button>
</form>

<br>
</body>
</html>
